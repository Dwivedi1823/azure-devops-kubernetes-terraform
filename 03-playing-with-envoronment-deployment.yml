trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage:
  jobs:
  - job: BuildJob
    steps:
    - bash: echo "Do the Build"

- stage: DevDeploy
  jobs:
  - deployment: DevDeployJob
    environment: Dev
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Deploy to $(environment)"

- stage: QADeploy
  jobs:
  - deployment: QADeployJob
    environment: QA
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Deployed to $(environment)"
